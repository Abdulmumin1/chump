name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install client deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck client
        run: pnpm --filter chump-agent run typecheck

      - name: Build client package
        run: pnpm --filter chump-agent run build

  server:
    name: Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout ai-query
        uses: actions/checkout@v4
        with:
          repository: Abdulmumin1/ai-query
          path: ai-query

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync server deps
        run: uv lock && uv sync

      - name: Import smoke check
        run: uv run python -c "import chump_server"

      - name: Compile Python package
        run: uv run python -m compileall chump_server

      - name: Build Python package
        run: uv build
