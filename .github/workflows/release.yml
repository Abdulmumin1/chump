name: Release

on:
  push:
    branches:
      - main
    tags:
      - "chump-server-v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/')
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build client
        run: pnpm --filter chump-agent run build

      - name: Create release PR or publish npm
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/chump-server-v') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout ai-query for dev lock compatibility
        uses: actions/checkout@v4
        with:
          repository: Abdulmumin1/ai-query
          path: ai-query

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build server package
        run: uv build

      - name: Validate built server version
        if: startsWith(github.ref, 'refs/tags/chump-server-v')
        run: |
          expected="${GITHUB_REF_NAME#chump-server-v}"
          python -c "from pathlib import Path; expected='$expected'; wheels=list(Path('dist').glob('chump_server-*.whl')); assert wheels, 'missing wheel'; name=wheels[0].name; assert name.startswith(f'chump_server-{expected}-'), f'{name} does not match {expected}'"

      - name: Publish server package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: server/dist
