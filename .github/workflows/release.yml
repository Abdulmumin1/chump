name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      client_tag:
        description: "Existing chump-agent release tag to upload client archives to, e.g. chump-agent@0.0.35"
        required: false
        type: string
      server_tag:
        description: "Existing chump-server tag to republish during recovery, e.g. chump-server-v0.1.10"
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  server-tag:
    name: Tag server release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create server tag from changelog
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          version=$(sed -nE 's/^## ([0-9]+\.[0-9]+\.[0-9]+)$/\1/p' server/CHANGELOG.md | head -n 1)
          if [[ -z "$version" ]]; then
            echo "The server changelog does not start with a stable version heading" >&2
            exit 1
          fi

          latest_tag=$(git tag --list 'chump-server-v*' --sort=-version:refname | head -n 1)
          latest_version=${latest_tag#chump-server-v}

          if [[ "$version" == "$latest_version" ]]; then
            echo "Server $version is already tagged"
            exit 0
          fi

          if [[ -n "$latest_tag" && "$(printf '%s\n' "$latest_version" "$version" | sort -V | tail -n 1)" != "$version" ]]; then
            echo "Server changelog version $version is older than existing tag $latest_tag" >&2
            exit 1
          fi

          tag="chump-server-v$version"
          remote_commit=$(git ls-remote origin "refs/tags/$tag" | awk 'NR == 1 { print $1 }')
          if [[ -n "$remote_commit" ]]; then
            if [[ "$remote_commit" != "$GITHUB_SHA" ]]; then
              echo "Tag $tag already exists at $remote_commit, not $GITHUB_SHA" >&2
              exit 1
            fi
            echo "Tag $tag already exists at this commit"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag" "$GITHUB_SHA"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  pypi:
    name: PyPI
    needs: server-tag
    if: >-
      always() &&
      (needs.server-tag.outputs.tag != '' || inputs.server_tag != '')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout server tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.server-tag.outputs.tag || inputs.server_tag }}
          fetch-depth: 0

      - name: Checkout ai-query for dev lock compatibility
        uses: actions/checkout@v4
        with:
          repository: Abdulmumin1/ai-query
          path: ai-query

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build server package
        run: uv build

      - name: Validate built server version
        run: |
          expected="${{ needs.server-tag.outputs.tag || inputs.server_tag }}"
          expected="${expected#chump-server-v}"
          python -c "from pathlib import Path; expected='$expected'; wheels=list(Path('dist').glob('chump_server-*.whl')); assert wheels, 'missing wheel'; name=wheels[0].name; assert name.startswith(f'chump_server-{expected}-'), f'{name} does not match {expected}'"

      - name: Publish server package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: server/dist

      - name: Prepare GitHub release notes
        run: |
          version="${{ needs.server-tag.outputs.tag || inputs.server_tag }}"
          version="${version#chump-server-v}"
          python scripts/extract_release_notes.py CHANGELOG.md "$version" .release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: server/.release-notes.md
          tag_name: ${{ needs.server-tag.outputs.tag || inputs.server_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  server-binaries:
    name: server binaries (${{ matrix.os }})
    needs: [pypi, server-tag]
    if: always() && needs.pypi.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-15-intel
          - os: macos-14
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout server tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.server-tag.outputs.tag || inputs.server_tag }}

      - name: Checkout ai-query for server build
        uses: actions/checkout@v4
        with:
          repository: Abdulmumin1/ai-query
          path: ai-query

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build server runtime archive
        run: python server/scripts/build_binary.py --mode onedir --archive

      - name: Build legacy server binary
        run: python server/scripts/build_binary.py --mode onefile

      - name: Upload server runtime archive
        uses: softprops/action-gh-release@v2
        with:
          files: |
            server/dist/bin/chump-server-*.tar.gz
            server/dist/bin/chump-server-*
          tag_name: ${{ needs.server-tag.outputs.tag || inputs.server_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm:
    name: npm
    needs: [server-tag, pypi]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.server-tag.result == 'success' &&
      (needs.pypi.result == 'success' || needs.pypi.result == 'skipped')
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      tag: ${{ steps.get_version.outputs.tag }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build client
        run: pnpm --filter chump-agent run build

      - name: Create release PR or publish npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Released Version
        if: steps.changesets.outputs.published == 'true'
        id: get_version
        run: |
          PUBLISHED_PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'
          VERSION=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name == "chump-agent") | .version')
          echo "tag=chump-agent@$VERSION" >> "$GITHUB_OUTPUT"

  binaries:
    name: binaries (${{ matrix.os }})
    needs: [npm, pypi]
    if: >-
      always() &&
      (needs.npm.outputs.published == 'true' || inputs.client_tag != '') &&
      (needs.pypi.result == 'success' || needs.pypi.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-15-intel
            platform: darwin-x64
          - os: macos-14
            platform: darwin-arm64
          - os: windows-latest
            platform: windows-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build latest server runtime
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          git fetch origin '+refs/tags/chump-server-v*:refs/tags/chump-server-v*' --force
          server_tag=$(git tag --list 'chump-server-v*' --sort=-version:refname | head -n 1)
          if [[ -z "$server_tag" || "$server_tag" == "null" ]]; then
            echo "No chump-server tag found" >&2
            exit 1
          fi

          git clone --depth 1 --branch "$server_tag" "https://github.com/$GITHUB_REPOSITORY.git" server-release
          git clone --depth 1 https://github.com/Abdulmumin1/ai-query.git server-release/ai-query
          cp server/scripts/build_binary.py server-release/server/scripts/build_binary.py
          python server-release/server/scripts/build_binary.py --mode onedir

          runtime="server-release/server/dist/bin/chump-server-$PLATFORM"
          if [[ ! -d "$runtime" ]]; then
            echo "Expected server runtime directory at $runtime" >&2
            exit 1
          fi

          mkdir -p client/vendor/chump-server
          cp -R "$runtime" "client/vendor/chump-server/"
          echo "Bundling chump-server-$PLATFORM runtime from $server_tag"

      - name: Build client archive
        run: pnpm --dir client run build:bin

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ -n "${{ inputs.client_tag }}" ]]; then
            echo "tag=${{ inputs.client_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.npm.outputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/packages/*.tar.gz
          tag_name: ${{ steps.release_tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
